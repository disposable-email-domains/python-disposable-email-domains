[tox]
envlist = py{37,38,39,310,311}

[testenv]
deps =
    check-manifest
    flake8
    mypy
    pytest
    twine
    build
commands =
    check-manifest --ignore tox.ini,tests*
    flake8 .
    mypy --strict disposable_email_domains
    py.test tests
    python -m build
    twine check dist/*
[flake8]
exclude = .tox,*.egg,build,data
select = E,W,F
